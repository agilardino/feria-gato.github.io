<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juego Feria de Gatos</title>
    
    <style>
        /* VARIABLES DE COLOR (Aquí puedes poner los colores de la feria) */
        :root {
            --bg-color: #f8f9fa;
            --main-text-color: #333;
            --btn-bg-color: #ff6b6b;
            --btn-text-color: #ffffff;
            --accent-color: #4ecdc4;
        }

        /* DISEÑO DE TU AMIGO AJUSTADO */
        #screen1-landing {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background-color: var(--bg-color);
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 50% 50%;
            z-index: 200;
            overflow: hidden;
            font-family: sans-serif;
        }
   
        .top__content {
            grid-row: 1 / 2;
            background-image: url("https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=500&q=80");
            background-position: center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .top__content > button {
            width: 80%;
            height: 80px;
            border: none;
            border-radius: 40px;
            font-size: 24px;
            text-transform: uppercase;
            font-weight: 900;        
            color: var(--btn-text-color);
            background-color: var(--btn-bg-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .main__text {
            grid-row: 2 / 3;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            text-align: center;
        }
        
        .txt h1 { font-size: 12vw; margin: 0; color: var(--main-text-color); }
        .txt p { font-size: 5vw; margin: 0; color: #777; }

        .botton__image {
            grid-row: 3 / 4;
            display: flex;
            width: 100%;
        }
        .botton__image div { flex: 1; }
        .botton__image img { width: 100%; height: 100%; object-fit: cover; }

        /* PANTALLAS NUEVAS (Registro y Juego) */
        .hidden-screen { display: none !important; }

        #screen-registro, #screen-juego, #screen-resultado {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: 300;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }

        .form-card {
            width: 85%;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-ready {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            font-size: 18px;
            margin-top: 10px;
        }

        /* ESTILOS DEL JUEGO */
        #gameCanvas {
            background-color: #e5e5e5;
            touch-action: none;
        }

        #ui-score {
            position: absolute;
            top: 30px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 30px;
            color: #333;
        }
        #ui-layer {
    position: absolute;
    top: 20px; width: 100%;
    display: flex; justify-content: space-around;
    font-family: sans-serif; font-weight: bold; font-size: 22px;
    z-index: 500; pointer-events: none;
}
#ui-timer { color: #e74c3c; background: rgba(255,255,255,0.8); padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

    <!-- SCREEN 1: LANDING (DISEÑO AMIGO) -->
    <div id="screen1-landing">
        <div class="top__content">
            <button id="btn-comenzar">¡JUGAR AHORA!</button>          
        </div>
        <div class="main__text">
            <div class="txt">
                <p>BIENVENIDOS A LA</p>
                <h1>FERIA GATUNA</h1>
            </div>
        </div>
       <!-- <div class="botton__image">
           <div><img src="https://images.unsplash.com/photo-1573865668131-974279df4037?auto=format&fit=crop&w=300&q=80" /></div>
           <div><img src="https://images.unsplash.com/photo-1533733356397-8679ff730249?auto=format&fit=crop&w=300&q=80" /></div>
        </div>-->
    </div>

    <!-- SCREEN 2: REGISTRO -->
    <div id="screen-registro" class="hidden-screen">
        <div class="form-card">
            <h2>¡Regístrate!</h2>
            <p>Atrapa mas de 20 ratones (150 pts) para ganar un premio especial.</p>
            <input type="text" id="nombre" placeholder="Tu nombre">
            <input type="email" id="correo" placeholder="Tu correo">
            <button class="btn-ready" id="btn-ir-al-juego">¡LISTO PARA CAZAR!</button>
        </div>
    </div>

    <!-- SCREEN 3: JUEGO -->
    <div id="screen-juego" class="hidden-screen">
        <div id="ui-layer">
            <div id="ui-score">Puntos: 0 / 130</div>
            <div id="ui-timer">Tiempo: 10s</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- SCREEN 4: RESULTADO -->
    <div id="screen-resultado" class="hidden-screen">
        <div class="form-card">
            <h1 id="res-titulo"></h1>
            <p id="res-texto"></p>
            <button class="btn-ready" onclick="location.reload()">VOLVER A INTENTAR</button>
        </div>
    </div>

    <script>
        // Variables de estado
        
        let score = 0;
        let timeLeft = 10;
        let timeInterval;
        let gameActive = false;
        let mice = [];
        let cat = { x: 0, y: 0 };
        let userData = { nombre: "", correo: "" };

        const PUNTAJE_MAXIMO = 130;
        const PUNTOS_POR_RATON = 5; // Cambiado de 10 a 5
        let velocidadBase = 8;      // Velocidad rápida
        let frecuenciaAparicion = 350; 


        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Navegación
        document.getElementById('btn-comenzar').addEventListener('click', () => {
            document.getElementById('screen1-landing').classList.add('hidden-screen');
            document.getElementById('screen-registro').classList.remove('hidden-screen');
        });

        document.getElementById('btn-ir-al-juego').addEventListener('click', () => {
            const n = document.getElementById('nombre').value;
            const c = document.getElementById('correo').value;
            
            if(!n || !c) {
                alert("Por favor completa los datos");
                return;
            }

            userData.nombre = n;
            userData.correo = c;
            console.log("Datos capturados:", userData);

            document.getElementById('screen-registro').classList.add('hidden-screen');
            document.getElementById('screen-juego').classList.remove('hidden-screen');
            initGame();
        });

        // Lógica del Juego
        function initGame() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cat.x = canvas.width / 2;
            cat.y = canvas.height - 100;
            gameActive = true;
            score = 0;
            timeLeft = 10;
            mice = [];
            // --- CONFIGURACIÓN DE cronometro ---
            document.getElementById('ui-timer').innerText = `Tiempo: ${timeLeft}s`;
            startTimer();
            spawnMouse();
            update();
        }




        // Control táctil
        window.addEventListener('touchmove', (e) => {
            if(!gameActive) return;
            cat.x = e.touches[0].clientX;
            cat.y = e.touches[0].clientY - 60; // Desfase para que el dedo no tape al gato
        }, { passive: false });

        // Mouse para probar en PC
        window.addEventListener('mousemove', (e) => {
            if(!gameActive) return;
            cat.x = e.clientX;
            cat.y = e.clientY;
        });

        function startTimer(){
            timeInterval =  setInterval(() => {
                timeLeft--;
                document.getElementById('ui-timer').innerText = `Tiempo: ${timeLeft}s`;

                if (timeLeft <= 0) {
                    clearInterval(timeInterval);
                    finalizar(score >= PUNTAJE_MAXIMO);
                }
            }, 1000);
        }

        function spawnMouse() {
    if(!gameActive) return;

    mice.push({
        x: Math.random() * (canvas.width - 60) + 30,
        y: -50,
        // Velocidad aleatoria muy rápida: entre 12 y 18 píxeles por frame
        speed: velocidadBase + (Math.random() * 6)
    });

    // Programar siguiente ratón (ritmo frenético)
    setTimeout(spawnMouse, frecuenciaAparicion);
}

function update() {
    if(!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Gato
    ctx.font = "60px Arial"; // Un poco más grande para ayudar al jugador
    ctx.fillText("🐱", cat.x, cat.y);

    for(let i = mice.length - 1; i >= 0; i--) {
        let m = mice[i];
        m.y += m.speed; 
        ctx.fillText("🐭", m.x, m.y);

        // Colisión (Hitbox de 60px porque van muy rápido)
        let dist = Math.hypot(cat.x - m.x, cat.y - m.y);
        if(dist < 60) {
            mice.splice(i, 1);
            score += PUNTOS_POR_RATON;
            document.getElementById('ui-score').innerText = `Puntos: ${score} / 130`;
            
            // Si llega a 100 antes de que acabe el tiempo, gana
            if(score >= PUNTAJE_MAXIMO) {
                clearInterval(timeInterval);
                finalizar(true);
            }
        }

        if(m.y > canvas.height + 50) mice.splice(i, 1);
    }
    requestAnimationFrame(update);
}

        function finalizar(ganaste) {
            gameActive = false;
            document.getElementById('screen-juego').classList.add('hidden-screen');
            document.getElementById('screen-resultado').classList.remove('hidden-screen');

            const titulo = document.getElementById('res-titulo');
            const texto = document.getElementById('res-texto');

            if(ganaste) {
                titulo.innerText = "¡GANASTE! 🏆";
                texto.innerText = `Excelente ${userData.nombre}, lograste 130 puntos. ¡Reclama tu premio con el anfitrión!`;
            } else {
                titulo.innerText = `Tu puntaje es de: ${score} ratones`;
                texto.innerText = "Muestra este puntaje al anfitrión y recibe tu obsequio.";
            }
        }

        // Ajuste de pantalla al rotar móvil
        //window.onresize = () => {
        //    canvas.width = window.innerWidth;
        //   canvas.height = window.innerHeight;
        //};
        window.onresize = function() {
            document.body.height = window.innerHeight;
            $("#screen1-landing").css("height", window.innerHeight + "px !important");
        }
        window.onresize();

    </script>
</body>
</html>
